/* ========== 渲染：追加消息（统一会话流） ========== */

function extraMsgs() {
  let h = '';
  for (const m of S.extra) {
    if (m.kind === 'user') h += userMsg(m.text);
    else if (m.kind === 'typing') h += typingMsg();
    else if (m.kind === 'agent') h += agentMsg('<div class="bubble"><p>' + m.text + '</p></div>');
    else if (m.kind === 'mtask') {
      h += agentMsg('<div class="bubble"><p>' + m.text + '</p></div>' +
        '<div class="mtask"><div class="mtask-h"><span class="mtask-ico" style="background:rgba(45,143,97,0.10);color:var(--main-m3)">' + ic('book') + '</span>' +
        '<span class="mtask-t">' + m.title + '</span>' + (m.done ? '<span class="badge green">Done</span>' : '<span class="status-pill running"><span class="sd"></span>Running</span>') + '</div>' +
        '<div class="mtask-s">' + (m.done ? 'Finished - summary saved, output in <button data-action="go-artifacts">Artifacts</button>.' : 'Running as a task in this channel - it won’t clutter this conversation.') + '</div></div>');
    }
    else if (m.kind === 'imrec') {
      h += agentMsg('<div class="bubble plain" style="font-size:13.5px;color:var(--text-n5)">' + m.text + '</div>' +
        '<div class="imrec"><button class="qr" data-action="open-im"><span class="qr-ico">' + ic('tg') + '</span>Connect Telegram</button>' +
        '<button class="qr" data-action="dismiss-imrec" data-id="' + m.id + '">Maybe later</button></div>');
    }
    else if (m.kind === 'sep') h += '<div class="day-sep">' + m.text + '</div>';
  }
  return h;
}

/* ========== 渲染：tab 面板 ========== */

function chatView() {
  const base = S.freshAt > 0 ? '<div class="day-sep">Short-term context cleared - artifacts, tasks and memory kept</div>' :

  return '<div class="stage-inner" style="max-width:720px">' + base + extraMsgs() + '</div>';
}

function tasksView() {
  const list = tasksFor();
  let h = '<div class="panel"><div class="panel-head"><h2>Tasks</h2><p>Complex asks become tasks - independent sessions that run in the background and report back. Outputs land in Artifacts; summaries can be saved to Memory.</p></div>';
  h += '<div class="panel-bar"><div class="grow"></div><button class="ghost-btn" data-action="hint-task">' + ic('plus') + 'New task</button></div>';
  if (!list.length) h += '<div class="empty-note">No tasks yet. Ask something heavy in Chat - "deep-dive CoWoS supply chain" - and it shows up here as its own session.</div>';
  else h += '<div class="task-list">' + list.map(t =>
    '<div class="task"><div class="task-h"><span class="tk-ico" style="background:' + TONE_FG[t.tone] + '1a;color:' + TONE_FG[t.tone] + '">' + ic(t.icon) + '</span>' +
    '<div><div class="tk-t">' + t.title + '</div><div class="tk-m"><span class="tk-type">' + t.type + '</span>' + (t.out ? '<span class="task-out">' + ic('file') + t.out + '</span>' : '') + '</div></div>' +
    '<span class="status-pill ' + t.status + '"><span class="sd"></span>' + (t.status === 'running' ? 'Running' : 'Done') + '</span></div>' +
    (t.step ? '<div class="task-body"><div class="step-now"><span class="sspin"></span>' + t.step + '</div></div>' : '') + '</div>').join('') + '</div>';

}

function memoryView() {
  const list = memoryFor();
  let h = '<div class="panel"><div class="panel-head"><h2>Memory</h2><p>What Alva keeps about you, long-term. Always visible, always editable. Campaign presets land here with a source tag - remove anything that isn’t you.</p></div>';
  if (!list.length) h += '<div class="empty-note">Nothing saved yet. Say "remember this" in Chat, or let a finished task propose a memory. Nothing is stored silently.</div>';
  else h += '<div class="mem-list">' + list.map(m =>
    '<div class="mem"><div class="mt">' + m.t + '</div><div class="mb">' + m.b + '</div>' +
    '<div class="mem-chips"><span class="memchip">' + (m.src === 'setup' ? 'from onboarding setup' : m.src) + '</span><span class="memchip">scope: user</span>' +
    '<button class="memchip mx" data-action="del-mem" data-id="' + m.id + '">Remove</button></div></div>').join('') + '</div>';

function artifactsView() {
  const a = artifactsFor();
  const empty = !a.autos.length && !a.playbooks.length && !a.files.length;

    '<div><div class="at">' + x.t + '</div><div class="ab">' + x.s + '</div></div>' +

  if (a.playbooks.length) h += '<div class="gm-label">Playbooks</div><div class="art-list" style="margin-bottom:20px">' + a.playbooks.map(x =>
    '<div class="art"><span class="fi" style="background:var(--main-m1-10);color:var(--main-m1)">' + ic('book') + '</span>' +
    '<div><div class="at">' + x.t + '</div><div class="ab">' + x.s + '</div></div><span class="badge">Remixable</span></div>').join('') + '</div>';

  document.getElementById('tb-desc').textContent = ENTRIES[S.entry].desc;

    '<button class="' + (S.entry === k ? 'active' : '') + '" data-action="entry" data-id="' + k + '"><span class="dot"></span>' + ENTRIES[k].label + '</button>').join('');

  return modalShell('Connect an IM', 'DM mirror - pushes and replies flow both ways, in this one channel.',
    '<div class="im-row"><span class="im-ico" style="background:rgba(109,189,255,0.12);color:#5aa6e8">' + ic('tg') + '</span>' +
    '<div><div class="im-name">Telegram</div><div class="im-sub' + (S.tgLinked ? ' on' : '') + '">' + (S.tgLinked ? 'Connected - pushes mirror to your DM' : 'Recommended - one tap via @AlvaBot') + '</div></div>' +
    (S.tgLinked ? '<button class="im-go busy">Connected</button>' : '<button class="im-go" data-action="connect-tg">Connect</button>') + '</div>' +
    '<div class="im-row"><span class="im-ico" style="background:rgba(166,141,255,0.12);color:#8b6fe0">' + ic('dc') + '</span>' +
    '<div><div class="im-name">Discord</div><div class="im-sub">After MVP - same model, different pipe</div></div>' +
    '<button class="im-go busy">Soon</button></div>' +
    '<div class="im-note">MVP keeps one external door: your Telegram DM. Group mirroring comes later.</div>');
}

function settingsModal() {
  return modalShell('Channel settings', 'The skeleton is all here - just scoped to one channel.',
    '<div style="padding:4px 8px 8px">' +
    '<div class="set-row"><span class="set-k">Channel</span><span class="set-v">Alva Agent - fixed, cannot be deleted</span></div>' +
    '<div class="set-row"><span class="set-k">Visibility</span><span class="set-v">Private - only you</span></div>' +
    '<div class="set-row"><span class="set-k">Notifications</span><span class="set-v">Pushes + daily digest</span></div>' +
    '<div class="set-row"><span class="set-k">Memory policy</span><span class="set-v">Explicit save + task proposals</span></div>' +
    '<div class="set-row"><span class="set-k">Skills</span><span class="set-v">Global Skill Hub - no per-channel config</span></div>' +
    '<div class="set-row"><span class="set-k">Connected IM</span><span class="set-v">' + (S.tgLinked ? 'Telegram - linked' : 'None yet') + '</span></div>' +
    '<div class="set-row"><span class="set-k">Context</span><span class="set-v"><button class="hub-link" data-action="start-fresh">Start fresh ' + ic('fresh') + '</button></span></div>' +
    '</div>');
}

function hubModal() {
  return modalShell('Skill Hub', 'Global and shared - the same five skills power every entry, no per-channel setup.',
    '<div class="skill-grid" style="padding:6px">' + SKILLS.map(s =>
      '<button class="skillc" data-action="hub-skill" data-id="' + s.id + '"><div class="sh"><span class="si" style="background:' + TONE_FG[s.tone] + '1a;color:' + TONE_FG[s.tone] + '">' + ic(s.icon) + '</span>' +
      '<div><div class="sn">' + s.label + '</div><div class="sc">' + s.kind + '</div></div></div>' +
      '<div class="sd">' + s.prompt + '</div></button>').join('') + '</div>', 560);
}

let modal = null;
function openModal(kind) { modal = kind; document.getElementById('modal-root').innerHTML = kind === 'im' ? imModal() : kind === 'settings' ? settingsModal() : hubModal(); }
function closeModal() { modal = null; document.getElementById('modal-root').innerHTML = ''; }

/* ========== 行为 ========== */

function push(msg) { msg.id = ++S.idSeq; S.extra.push(msg); return msg.id; }

function respond(text, replyFactory) {
  S.tab = 'chat';
  push({ kind: 'user', text: text });
  const tid = push({ kind: 'typing' });
  render(true);
  setTimeout(() => {
    S.extra = S.extra.filter(m => m.id !== tid);
    replyFactory();
    render(true);
  }, 900);
}

function plainReply(text) { respond(text, () => push({ kind: 'agent', text: ENTRIES[S.entry].reply })); }

function skillReply(s) {
  respond(s.prompt, () => {
    const id = push({ kind: 'mtask', text: 'Good one - this needs real work, so I made it a task. It runs in its own session; watch it on the Tasks tab.', title: s.kind + ': ' + s.label, done: false });
    setTimeout(() => { const m = S.extra.find(x => x.id === id); if (m) { m.done = true; render(true); } }, 4200);
  });
  S.openSkill = null;
}

function activateKol() {
  S.live.kol = true;
  push({ kind: 'agent', text: '<b>KOL-AI-Digest is live.</b> ' + kolVoiceCount() + ' voices, daily 07:30 ET, delivered here. I seeded your Memory with the cadence - and the rule sits under Artifacts if you ever want to inspect it.' });
  if (!S.tgLinked) push({ kind: 'imrec', text: 'Want the same digest in your pocket? Connect Telegram and this channel mirrors to your DM.' });
  render(true);
}

function activatePortfolio() {
  S.live.portfolio = true;
  push({ kind: 'agent', text: '<b>Portfolio-Digest is live.</b> ' + S.assets.size + ' tickers, pre-market brief, delivered here. The rule sits under Artifacts if you ever want to inspect it.' });
  if (!S.tgLinked) push({ kind: 'imrec', text: 'Want the same brief in your pocket? Connect Telegram and this channel mirrors to your DM.' });
  render(true);
}

function connectTg() {
  S.tgLinked = true;
  S.extra = S.extra.filter(m => m.kind !== 'imrec');
  push({ kind: 'agent', text: '<b>Telegram connected.</b> Pushes now mirror to your DM and your replies there flow back into this channel - one conversation, two doors.' });
  closeModal();
  render(true);
}

function startFresh() {
  S.extra = [];
  S.openSkill = null;
  S.freshAt = Date.now();
  closeModal();
  push({ kind: 'agent', text: 'Fresh window. I dropped the short-term context - Artifacts, Tasks, Memory and your presets are all still here. What’s next?' });
  S.tab = 'chat';
  render(true);
}

function switchEntry(id) {
  Object.assign(S, { entry: id, tab: 'chat', openSkill: null, packs: new Set(['ai']), customVoices: [], assets: new Set(['BTC', 'ETH']), live: { kol: false, tg: false }, extra: [], removedMem: new Set(), freshAt: 0 });
  render(false);
  document.getElementById('stage').scrollTop = 0;
}

/* ========== 事件委托 ========== */

document.addEventListener('click', (ev) => {
  const el = ev.target.closest('[data-action]');
  if (!el) return;
  const act = el.dataset.action, id = el.dataset.id;
  if (act === 'entry') switchEntry(id);
  else if (act === 'tab') { S.tab = id; render(false); }
  else if (act === 'skill') { S.openSkill = S.openSkill === id ? null : id; render(false); }
  else if (act === 'skill-prompt') skillReply(SKILLS.find(s => s.id === id));
  else if (act === 'prompt' || act === 'qr') plainReply(el.dataset.text);
  else if (act === 'pack') { S.packs.has(id) ? S.packs.delete(id) : S.packs.add(id); render(false); }
  else if (act === 'asset') { S.assets.has(id) ? S.assets.delete(id) : S.assets.add(id); render(false); }
  else if (act === 'add-voice') {
    const input = document.getElementById('ko-input');
    const v = (input && input.value.trim()) || '';
    if (v) { S.customVoices.push(v.startsWith('@') ? v : '@' + v); render(false); }
  }
  else if (act === 'activate-kol') activateKol();
  else if (act === 'activate-portfolio') activatePortfolio();
  else if (act === 'go-artifacts') { S.tab = 'artifacts'; render(false); }
  else if (act === 'open-im') openModal('im');
  else if (act === 'open-settings') openModal('settings');
  else if (act === 'open-hub') openModal('hub');
  else if (act === 'hub-skill') { closeModal(); S.tab = 'chat'; skillReply(SKILLS.find(s => s.id === id)); }
  else if (act === 'connect-tg') connectTg();
  else if (act === 'close-modal') closeModal();
  else if (act === 'start-fresh') startFresh();
  else if (act === 'del-mem') { S.removedMem.add(id); render(false); }
  else if (act === 'dismiss-imrec') { S.extra = S.extra.filter(m => m.kind !== 'imrec'); render(true); }
  else if (act === 'hint-task') plainReply('Create a task: track TSMC monthly revenue and flag misses');
  else if (act === 'send') {
    const input = document.getElementById('composer-input');
    const v = (input && input.value.trim()) || '';
    if (v) { input.value = ''; plainReply(v); }
  }
});

document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Enter' && !ev.shiftKey && ev.target.id === 'composer-input') {
    ev.preventDefault();
    const v = ev.target.value.trim();
    if (v) { ev.target.value = ''; plainReply(v); }
  }
  if (ev.key === 'Escape' && modal) closeModal();
});

render(false);
})();
</script>
<script src="/demo/_switcher.js" defer></script>
</body>
</html>

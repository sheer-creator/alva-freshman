function MiniSpark({ points, tone }) {
  const stroke = TONE_FG[tone] || 'var(--main-m1)';
  const w = 88, h = 34;
  const max = Math.max(...points), min = Math.min(...points);
  const d = points.map((v, i) => {
    const x = (i / (points.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * (h - 6) - 3;
    return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg className="skg-spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" fill="none">
      <path d={`${d} L${w},${h} L0,${h} Z`} fill={stroke} opacity="0.10" />
      <path d={d} stroke={stroke} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

/* full-width area chart for the live preview window */
function PreviewArea({ points, tone }) {
  const stroke = TONE_FG[tone] || 'var(--main-m1)';
  const w = 300, h = 90;
  const max = Math.max(...points), min = Math.min(...points);
  const xs = points.map((v, i) => (i / (points.length - 1)) * w);
  const ys = points.map((v) => h - ((v - min) / (max - min || 1)) * (h - 8) - 4);
  const line = points.map((v, i) => `${i === 0 ? 'M' : 'L'}${xs[i].toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const gid = `pvg-${tone}`;
  return (
    <svg className="pvw-area" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" fill="none">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={stroke} stopOpacity="0.20" /><stop offset="1" stopColor={stroke} stopOpacity="0" /></linearGradient></defs>
      <path d={`${line} L${w},${h} L0,${h} Z`} fill={`url(#${gid})`} />
      <path d={line} stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

/* time-aware context for the daily brief */
function timeContext() {
  const now = new Date();
  const h = now.getHours();
  const at = (addMin) => {
    const d = new Date(now.getTime() + addMin * 60000);
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  };
  if (h < 12) return { at, greeting: 'Good morning' };
  if (h < 18) return { at, greeting: 'Good afternoon' };
  return { at, greeting: 'Good evening', isEvening: true };
}

/* lightweight markdown renderer for User.md */
function renderMarkdown(src) {
  const lines = src.split('\n');
  const out = [];
  let list = null;
  const inline = (t) => {
    const parts = [];
    let rest = t, key = 0;
    const re = /(\*\*([^*]+)\*\*|_([^_]+)_)/;
    let m;
    while ((m = re.exec(rest))) {
      if (m.index > 0) parts.push(rest.slice(0, m.index));
      if (m[2] != null) parts.push(<strong key={key++}>{m[2]}</strong>);
      else parts.push(<em key={key++}>{m[3]}</em>);
      rest = rest.slice(m.index + m[0].length);
    }
    if (rest) parts.push(rest);
    return parts;
  };
  const flush = () => { if (list) { out.push(<ul key={'u' + out.length}>{list}</ul>); list = null; } };
  lines.forEach((ln, i) => {
    if (ln.startsWith('## ')) { flush(); out.push(<h2 key={i}>{ln.slice(3)}</h2>); }
    else if (ln.startsWith('# ')) { flush(); out.push(<h1 key={i}>{ln.slice(2)}</h1>); }
    else if (ln.startsWith('- ')) { list = list || []; list.push(<li key={i}>{inline(ln.slice(2))}</li>); }
    else if (ln.trim() === '') { flush(); }
    else { flush(); out.push(<p key={i}>{inline(ln)}</p>); }
  });
  flush();
  return out;
}

function AskCard({ q, options, onSubmit }) {

/* slim per-task composer — steer a session without leaving the list */
function TaskComposer({ placeholder, onSend }) {
  const [val, setVal] = useState('');
  const submit = () => { const v = val.trim(); if (!v) return; onSend(v); setVal(''); };
  return (
    <div className="tcomposer">
      <input value={val} placeholder={placeholder} onChange={(e) => setVal(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') submit(); }} />
      <button className={`tsend${val.trim() ? ' on' : ''}`} onClick={submit} aria-label="Send"><Icon name="arrowup" size={14} /></button>
    </div>
  );
}

/* a task-scoped acknowledgement, in context of where the session stands */
const taskAck = (t) =>
  t.status === 'done' ? 'This session is closed — say the word and I’ll reopen it with that change.'
  : t.status === 'queued' ? 'Noted — I’ll apply that when this session starts.'
  : t.status === 'needs-input' ? 'Thanks — that unblocks me, continuing the build now.'
  : 'Got it — folding that in. The current step re-runs with your instruction.';

        ))}
      </div>
    </div>
  );
}

const TASK_ROUTES = [
  { m: /yes — run the deep dive/i, t: () => ({ taskType: 'Research', tone: 'blue', title: 'Research: full deep dive', sub: 'Going deeper on your question — sources, data, and a written brief, saved to Artifacts.', steps: ['Scope the question', 'Pull sources and data', 'Draft the brief'] }) },
  { m: /run (.+?) once now/i, t: (mm) => ({ taskType: 'Automation', tone: 'amber', title: `Run once: ${mm[1]}`, sub: 'A one-off pass outside the schedule — the result will push here when it lands.', steps: ['Pull fresh data', 'Apply the rule set', 'Push the result'] }) },
  { m: /tune .*(rule|monitor)|stricter/i, t: () => ({ taskType: 'Automation', tone: 'amber', title: 'Tune: AI-Capex-Monitor', sub: 'Tightening the rule — I’ll backtest the stricter threshold over the last 90 days before redeploying.', steps: ['Raise the revision threshold to top-5%', 'Backtest the stricter rule over 90 days', 'Redeploy the watch'] }) },
  { m: /^tune /i, t: (mm, text) => ({ taskType: 'Playbook', tone: 'teal', title: `Update: ${short(text.replace(/^tune /i, ''))}`, sub: 'Applying your changes and re-running the basket before the next scheduled refresh.', steps: ['Apply the changes', 'Re-run the basket', 'Update the live view'] }) },
  { m: /stop alert|price alert|alert me|wire .*stop/i, t: () => ({ taskType: 'Automation', tone: 'amber', title: 'Alert: VRT stop at $104', sub: 'Wiring the trigger — once live I’ll watch in the background and push the moment it fires.', steps: ['Set the trigger at $104', 'Wire delivery here + Telegram', 'Activate the watch'] }) },
  { m: /^screen |screener/i, t: (mm, text) => ({ taskType: 'Automation', tone: 'amber', title: `Screen: ${short(text.replace(/^screen /i, ''))}`, sub: 'Building the screen and wiring the daily refresh — new entrants will push here on every run.', steps: ['Define the factor rules', 'Backfill current matches', 'Schedule the daily scan'] }) },
  { m: /^backtest /i, t: (mm, text) => ({ taskType: 'Playbook', tone: 'teal', title: `Backtest: ${short(text.replace(/^backtest (a |an |the )?/i, ''))}`, sub: 'Running the strategy over the full window — equity curve, attribution, and drawdowns land in Artifacts.', steps: ['Assemble the universe and rules', 'Run the simulation', 'Write up the results'] }) },
  { m: /turn this into a live playbook/i, t: () => ({ taskType: 'Playbook', tone: 'teal', title: 'Build: MAG7 momentum playbook', sub: 'Promoting the backtest into a live playbook — monthly rebalance wired, results pushed here.', steps: ['Port the rules from the backtest', 'Wire the monthly rebalance', 'Go live'] }) },
  { m: /tracker|^track |^follow /i, t: (mm, text) => ({ taskType: 'Playbook', tone: 'teal', title: `Build: ${short(text.replace(/^(build|set up|make|create) (a |an |the )?/i, ''))}`, sub: 'Building the tracker — pulling data, drafting the layout, and wiring its refresh.', steps: ['Define scope and inputs', 'Pull data and build the view', 'Wire the refresh schedule'] }) },
  { m: /deep-dive|deep dive|^value |sotp|reverse-dcf|relative multiple/i, t: (mm, text) => ({ taskType: 'Research', tone: 'blue', title: `Research: ${short(text)}`, sub: 'Gathering filings, peers, and supply-chain data — the brief posts here and saves to Artifacts.', steps: ['Scope the question', 'Pull sources and data', 'Draft the brief'] }) },
  { m: /^what if /i, t: (mm, text) => ({ taskType: 'Research', tone: 'blue', title: `Scenario: ${short(text.replace(/^what if /i, ''))}`, sub: 'Repricing your book under the scenario — direct exposure, correlated names, and the total drag.', steps: ['Set the shock parameters', 'Reprice the book', 'Post the breakdown'] }) },

function routeReply(text) {
  for (const a of ANSWER_ROUTES) if (a.m.test(text)) return { kind: 'answer', paras: a.paras, chips: a.chips };
  for (const r of TASK_ROUTES) { const mm = r.m.exec(text); if (mm) return { kind: 'task', ...r.t(mm, text) }; }
  if (text.length > 80 || /^(build|create|make|set up|screen|backtest|track|deep-dive|run|scan|turn|tune|find)\b/i.test(text.trim())) {
    return { kind: 'task', taskType: 'Research', tone: 'blue', title: `Research: ${short(text)}`, sub: 'Pulling sources and data — the brief will post here and save to Artifacts.', steps: ['Scope the question', 'Pull sources and data', 'Draft the brief'] };
  }
  return { kind: 'answer', paras: [
    'Quick take: nothing here changes your positioning yet — real signal, but second-order for your basket.',
    'Want the full picture? Say the word and I’ll run a proper deep dive and post the brief here.',
  ] };
}

/* inline rich text: $TICKER reads as a cashtag */
const rich = (text) => text.split(/(\$[A-Z]{2,6}\b)/g).map((seg, i) => (seg[0] === '$' ? <span className="cashtag" key={i}>{seg}</span> : seg));

function ExtraThread({ extra, subtle, onGoTasks, onGoArtifacts, onConnectIm }) {
  return extra.map((m) => {
    if (m.role === 'user') return <UserMsg key={m.id} text={m.text} />;
    if (m.role === 'typing') return (
      <AgentMsg key={m.id} persona="subtle"><div className="typing"><i></i><i></i><i></i></div></AgentMsg>
    );
    // direct answer — simple questions get a conversational reply, not a loader
    if (m.role === 'agent' && m.reply.kind === 'answer') {
      return (
        <AgentMsg key={m.id} persona={m.push ? 'full' : (subtle ? 'subtle' : 'full')} push={m.push} time={m.push ? 'now' : (subtle ? null : 'now')}>
          <div className="bubble">
            {m.reply.paras.map((p, i) => <p key={i} style={i ? { marginTop: 8 } : null}>{rich(p)}</p>)}
          </div>
        </AgentMsg>
      );
    }
    // first push right after an instant subscribe — moves the user out of the onboarding state
    // post-setup nudge: the channel just did real work but only lives on the Web
    if (m.role === 'agent' && m.reply.kind === 'imrec') {
      return (
        <AgentMsg key={m.id} persona="full" time="now">
          <div className="bubble">
            <p>One more thing — this channel only lives on the Web right now. Connect Telegram or Discord and every push lands in your DM the moment it fires, in this channel’s own thread.</p>
          </div>
          {onConnectIm && (
            <div className="chips" style={{ marginTop: 8 }}>
              <button className="chip" onClick={() => onConnectIm('telegram')}><span className="ci" style={{ color: IM_TINT.telegram }}><Icon name="telegram" size={16} /></span>Connect Telegram</button>
              <button className="chip" onClick={() => onConnectIm()}><span className="ci"><Icon name="link" size={16} /></span>See all IMs</button>
            </div>
          )}
        </AgentMsg>
      );
    }
    if (m.role === 'agent' && m.reply.kind === 'subpush') {
      const p = m.reply.item;
      const isAuto = m.reply.skillKind === 'automation';
      const unit = isAuto ? 'alert' : 'run';
      // cold start: brand-new or no pushes produced yet — set expectations + offer a first run
      const hasContent = !p.fresh && (isAuto ? !!p.push : !!p.rows);
      return (
        <AgentMsg key={m.id} persona="full" push time="now">
          {hasContent
            ? <div className="bubble"><span style={{ fontWeight: 500 }}>{p.t}</span> is live in your workspace. Here's the latest {unit} — new ones will land right here.</div>
            : <div className="bubble"><span style={{ fontWeight: 500 }}>{p.t}</span> is live in your workspace. Nothing has been pushed yet — the first {unit} lands with the next cycle{(p.every || p.meta) ? ` (${p.every || p.meta})` : ''}. Want me to run it once now?</div>}
          {hasContent && (
            <div className="subpush-card">
              {isAuto ? (
                <div className="pvw-push" style={{ margin: '10px 0' }}><span className="pvw-bell"><Icon name="alert" size={13} /></span>{p.push}</div>
              ) : (
                <>
                  <div className="pvw-rows" style={{ borderTop: 'none' }}>
                    {p.rows.map((r, j) => (
                      <div className="pvw-row" key={j}><span className="pvw-tkr">{r.t}</span><span className="pvw-v">{r.v}</span><span className={`pvw-c ${r.up ? 'up' : 'down'}`}>{r.c}</span></div>
                    ))}
                  </div>
                  <div className="subpush-stat">{p.chart.label} · <span style={{ color: TONE_FG[p.tone] }}>{p.chart.value}</span></div>
                </>
              )}
            </div>
          )}
          <div style={{ marginTop: 4 }}><SourceTag source={isAuto ? { automation: p.t } : { automation: `${p.cadence || 'scheduled'}-run`, playbook: p.t }} onGoArtifacts={onGoArtifacts} /></div>
        </AgentMsg>
      );
    }
    if (m.role === 'agent') return (
      <AgentMsg key={m.id} persona={subtle ? 'subtle' : 'full'} time={subtle ? null : 'now'}>
        {m.reply.kind === 'task' ? (() => {
          const r = m.reply;
          const done = r.status === 'done';
          const live = r.taskType === 'Automation';
          return (
            <div className="mtask">
              <div className="mtask-h">
                <span className="mtask-ico" style={{ background: TONE_BG[r.tone], color: TONE_FG[r.tone] }}><Icon name={r.taskType === 'Automation' ? 'automation' : r.taskType === 'Research' ? 'search' : 'target'} size={14} /></span>
                <span className="mtask-t">{r.title}</span>
                {done
                  ? <span className="status-pill done"><span className="sd"></span>{live ? 'Live' : 'Done'}</span>
                  : <span className="status-pill running"><span className="sd"></span>Running</span>}
              </div>
              <div className="mtask-s">
                {done
                  ? <>{r.doneNote || (r.taskType === 'Research' ? 'Brief ready — saved to Artifacts.' : live ? 'Live — pushes will land here.' : 'Built and live.')} <button onClick={onGoArtifacts}>View in Artifacts</button></>
                  : <>Background task — I’ll post here when it’s done. <button onClick={onGoTasks}>Track it in Tasks</button></>}
              </div>
            </div>
          );
        })() : (
          <div className="building">
            <div className="bt"><span className="spin"></span>{m.reply.title}</div>
            <div className="bp"><span></span></div>
            <div className="bs">{m.reply.sub}</div>
          </div>
        )}
      </AgentMsg>
    );
    return null;
  });
}

/* curated packs — batch-select sets of entities, shared by inline onboards
   and the automation modal; member lists mirror the mobile concept */
const ENTITY_PACKS = {
  kol: [
    { name: 'AI Infrastructure', handles: ['@SerenityFund', '@EvergreenCap', '@chip_insider', '@macroscopex'], sub: 'Serenity, Evergreen, Chip Insider +1 \u00b7 4 voices' },
    { name: 'Macro & Rates', handles: ['@macroscopex', '@volwhisperer', '@saxena_puru'], sub: 'Macro Scope X, Vol Whisperer, Puru Saxena \u00b7 3 voices' },
    { name: 'Crypto Desk', handles: ['@SatoshiA', '@coldwallet', '@mai_t', '@q_macro'], sub: 'Satoshi A, Coldwallet +2 \u00b7 4 voices' },
  ],
  tickers: [

    { name: 'Power & Grid', handles: ['VRT', 'GEV'], sub: 'VRT, GEV \u00b7 2 names' },
  ],
};
/* a pack reads as Added iff every member is picked — derived, no second source of truth */
const packOn = (pk, picked) => pk.handles.every((h) => !!picked[h]);
const applyPack = (pk, picked, setRecs, setPicked) => {
  const on = packOn(pk, picked);
  if (!on) setRecs((r) => [...r, ...pk.handles.filter((h) => !r.some((k) => k.handle === h)).map((h) => ({ name: h.replace(/^@/, ''), handle: h, focus: `From ${pk.name}` }))]);
  setPicked((p) => { const n = { ...p }; pk.handles.forEach((h) => { n[h] = !on; }); return n; });
};

/* ============ shared entity picker ============
   One widget wherever a template needs entities — inline in a channel
   onboard or inside the automation modal: rich recommendation rows with a
   one-click toggle, plus a free-entry handle row. */
function EntityPicker({ recs, picked, onToggle, onAdd, packs, onPack, placeholder, onLabel = 'Following', offLabel = 'Follow', compact }) {
  const [entry, setEntry] = useState('');
  const add = () => { const v = entry.trim(); if (v) onAdd(v); setEntry(''); };
  const member = (h) => recs.find((k) => k.handle === h) || { name: h.replace(/^@/, '') };
  return (
    <>
      {packs && (
        <>
          <div className="pk-label">Curated packs</div>
          {packs.map((pk) => {
            const on = packOn(pk, picked);
            return (
              <div className="pack" key={pk.name}>
                <div className="pk-info">
                  <div className="pk-row">
                    <span className="pk-avas">
                      {pk.handles.slice(0, 3).map((h) => <span className="pkav" style={{ background: avaColor(member(h).name) }} key={h}>{initials(member(h).name)}</span>)}
                      {pk.handles.length > 3 && <span className="pkav more">+{pk.handles.length - 3}</span>}
                    </span>
                    <span className="pk-n">{pk.name}</span>
                  </div>
                  <div className="pk-s">{pk.sub}</div>
                </div>
                <button className={`pk-add${on ? ' on' : ''}`} onClick={() => onPack(pk)}>{on ? <><Icon name="check" size={13} />Added</> : '+ Add'}</button>
              </div>
            );
          })}
          <div className="pk-label" style={{ marginTop: 14 }}>Or pick individually</div>
        </>
      )}
      <div className={`ko-grid${compact ? ' compact' : ''}`}>
        {recs.map((k) => {
          const on = !!picked[k.handle];
          return (
            <div className={`ko-card${on ? ' on' : ''}`} key={k.handle}>
              <span className="ko-ava" style={{ background: avaColor(k.name) }}>{initials(k.name)}</span>
              <div className="ko-info">
                <div className="ko-name">{k.name} <span className="ko-handle">{k.handle}</span></div>
                <div className="ko-focus">{k.focus}</div>
                {k.stat && <div className="ko-stat">{k.stat}</div>}
              </div>
              <button className={`ko-follow${on ? ' on' : ''}`} onClick={() => onToggle(k.handle)}>
                {on ? <><Icon name="check" size={14} /> {onLabel}</> : `+ ${offLabel}`}
              </button>
            </div>
          );
        })}
      </div>
      <div className="ko-custom">
        <span className="ko-at"><Icon name="at" size={16} /></span>
        <input value={entry} onChange={(e) => setEntry(e.target.value)} placeholder={placeholder}
          onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); add(); } }} />
        <button className="ko-add" disabled={!entry.trim()} onClick={add}>Add</button>
      </div>
    </>
  );
}

function KolFollowOnboard({ onDigest }) {

function AutomationModal({ channelId, initial, onClose, onSave }) {
  const editing = !!initial;
  const cfg = (initial && initial.custom) || {};
  const [mode, setMode] = useState(cfg.mode || 'template');
  const [tpl, setTpl] = useState(cfg.tpl || 'kol');
  const t = AUTO_TEMPLATES.find((x) => x.id === tpl);
  const seedRecs = (base) => [...base, ...(cfg.entities || []).filter((h) => !base.some((k) => k.handle === h)).map((h) => ({ name: h.replace(/^@/, ''), handle: h, focus: 'Added by you' }))];
  const [recs, setRecs] = useState(() => seedRecs(t.recs));
  const [picked, setPicked] = useState(() => Object.fromEntries((cfg.entities || []).map((h) => [h, true])));
  const entities = Object.keys(picked).filter((h) => picked[h]);
  const [prompt, setPrompt] = useState(cfg.prompt != null ? cfg.prompt : t.prompt);
  const [instruction, setInstruction] = useState(cfg.instruction || '');
  const [every, setEvery] = useState(initial ? initial.runEvery : t.every);
  const [deliver, setDeliver] = useState(cfg.deliver || channelId);
  const targets = CHANNELS.filter((c) => c.kind !== 'group' || c.id === channelId);
  const pickTpl = (id) => { const nt = AUTO_TEMPLATES.find((x) => x.id === id); setTpl(id); setRecs(nt.recs); setPicked({}); setPrompt(nt.prompt); if (!editing) setEvery(nt.every); };
  const toggle = (h) => setPicked((p) => ({ ...p, [h]: !p[h] }));
  const addCustom = (v) => {
    setRecs((r) => (r.some((k) => k.handle === v) ? r : [...r, { name: v.replace(/^@/, ''), handle: v, focus: 'Added by you' }]));
    setPicked((p) => ({ ...p, [v]: true }));
  };
  const onPack = (pk) => applyPack(pk, picked, setRecs, setPicked);
  const ok = mode === 'template' ? entities.length > 0 : instruction.trim().length > 0;
  // the name derives itself — template name, or the first words of the instruction
  const autoName = editing ? initial.name
    : mode === 'template' ? t.name
    : (instruction.trim().split(/\s+/).slice(0, 3).join('-').replace(/[^A-Za-z0-9-]/g, '') || 'Custom-Watch');
  const save = () => ok && onSave({ name: autoName, runEvery: every, custom: { mode, tpl, entities, prompt, instruction, deliver } });
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ width: 480, maxHeight: '88vh' }} onClick={(e) => e.stopPropagation()}>
        <div className="modal-h">
          <div>
            <div className="modal-t">{editing ? 'Edit automation' : 'New automation'}</div>
            <div className="modal-s">{editing ? initial.name : 'A standing instruction — Alva runs it on schedule and pushes the result.'}</div>
          </div>
          <button className="modal-x" onClick={onClose} aria-label="Close"><Icon name="plus" size={16} /></button>
        </div>
        <div className="modal-body" style={{ padding: '20px 20px 18px' }}>
          <div className="seg even">
            <button className={mode === 'template' ? 'active' : ''} onClick={() => setMode('template')}>From a template</button>
            <button className={mode === 'instruction' ? 'active' : ''} onClick={() => setMode('instruction')}>From instructions</button>
          </div>

          {mode === 'template' ? (
            <>
              <div className="am-row" style={{ marginTop: 18 }}>
                {AUTO_TEMPLATES.map((x) => (
                  <button key={x.id} className={`am-tpl${tpl === x.id ? ' on' : ''}`} onClick={() => pickTpl(x.id)}>
                    <span className="am-tpl-t">{x.label}</span>
                    <span className="am-tpl-s">{x.hint}</span>
                  </button>
                ))}
              </div>
              <div className="am-label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                {t.entityLabel}
                <span className="ko-count">{entities.length} {t.onLabel.toLowerCase()}</span>
              </div>
              <EntityPicker compact recs={recs} picked={picked} onToggle={toggle} onAdd={addCustom} packs={t.packs} onPack={onPack}
                placeholder={t.ph} onLabel={t.onLabel} offLabel={t.offLabel} />
              <div className="am-label">Digest prompt</div>
              <textarea className="post-edit" rows={3} value={prompt} onChange={(e) => setPrompt(e.target.value)} />
            </>
          ) : (
            <textarea className="post-edit" rows={4} style={{ marginTop: 18 }} value={instruction}
              placeholder={'Describe what to watch and what to push — e.g. \u201cWatch 8h funding; alert me the moment it crosses 0.05% with a one-line read.\u201d'}
              onChange={(e) => setInstruction(e.target.value)} />
          )}

          <div className="am-base">
            <label className="am-sel">
              <span className="am-sel-k">Runs</span>
              <select value={every} onChange={(e) => setEvery(e.target.value)}>
                {AUTO_CADENCES.map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
            </label>
            <label className="am-sel">
              <span className="am-sel-k">Deliver to</span>
              <select value={deliver} onChange={(e) => setDeliver(e.target.value)}>
                {targets.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </label>
          </div>

          <div className="nc-foot">
            <div className="post-meta">Pushes land in the channel — and mirror to its connected IMs.</div>
            <button className="post-go" disabled={!ok} onClick={save}>{editing ? 'Save' : 'Create'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ArtifactsPanel({ onCard, files = ARTIFACTS, autos = AUTOMATIONS, playbooks = PLAYBOOKS, isGroup = false, initialSeg = null, channelId = 'agent' }) {
  const hasPlaybooks = playbooks.length > 0;
  const [seg, setSeg] = useState(initialSeg || (hasPlaybooks ? 'playbooks' : 'automations'));
  const [autoModal, setAutoModal] = useState(null); // 'new' | the automation being edited
  const [, bump] = useState(0);
  const saveAuto = (data) => {
    if (autoModal === 'new') {
      let id = 'ua-' + data.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      while (autos.some((x) => x.id === id)) id += '-2';
      autos.unshift({ id, status: 'active', lastRun: '\u2014', runs: 0, usedBy: [], ...data });
    }
    else Object.assign(autoModal, data);
    setAutoModal(null);
    bump((n) => n + 1);
  };
  const activeAutos = autos.filter((a) => a.status === 'active').length;
  const segs = [];
  if (hasPlaybooks) segs.push(['playbooks', `Playbooks · ${playbooks.length}`]);
  segs.push(['automations', `Automations · ${activeAutos}`]);
  segs.push(['files', `Files · ${files.length}`]);
  return (
    <div className="panel">
      <div className="panel-head">
        <h2>Artifacts</h2>
        <p>{isGroup
          ? 'Everything this channel has built or runs, shared with all members — playbooks, the automations feeding them, and the files they produce.'
          : 'Everything Alva has built or runs in this channel — playbooks, the automations feeding them, and the files they produce.'}</p>
      </div>
      <div className="panel-bar">
        <div className="seg">
          {segs.map(([id, l]) => (
            <button key={id} className={seg === id ? 'active' : ''} onClick={() => setSeg(id)}>{l}</button>
          ))}
        </div>
        <span className="grow"></span>
        {seg === 'automations' && (
          <button className="newauto" onClick={() => setAutoModal('new')}><Icon name="plus" size={14} />New automation</button>
        )}

      {seg === 'playbooks' && (
        <div className="cardgrid">
          {playbooks.map((p) => <PlaybookCard p={p} key={p.id} onClick={onCard} />)}
        </div>
      )}

      {seg === 'automations' && <AutomationRows items={autos} onEdit={(a) => setAutoModal(a)} channelId={channelId} />}
      {/* portal: .panel animates with a transform, which would otherwise trap this fixed overlay */}
      {autoModal && ReactDOM.createPortal(
        <AutomationModal channelId={channelId} initial={autoModal === 'new' ? null : autoModal} onClose={() => setAutoModal(null)} onSave={saveAuto} />,
        document.body
      )}

      {seg === 'files' && (
        <div className="art-list">
          {files.map((a) => (
            <div className="art" key={a.t}>
              <span className="fi" style={{ background: TONE_BG[a.tone], color: TONE_FG[a.tone] }}>{a.kind}</span>
              <div>
                <div className="at">{a.t}</div>
                <div className="ab">{a.b}</div>
              </div>
              <span className={`badge ${a.badgeKind}`}>{a.badge}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

                <span className="qc-radio">{vis === id && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="#fff" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>}</span>
                <div><div className="qc-label">{label}</div><div className="qc-desc">{desc}</div></div>
              </div>
            ))}
            <div className="acc-note">{admin ? 'Changes apply to the Web mirror only — the IM group itself is untouched.' : 'Only Group Admins can change visibility.'}</div>
          </div>
          <div className="acc-sec" style={{ borderBottom: 'none' }}>
            <div className="acc-h">Mirror</div>
            <div className="set-row"><span className="set-k">Source</span><span className="set-v">{src} group · connected</span></div>
            <div className="set-row"><span className="set-k">Web write-back</span><span className="set-v">Explicit “Post to group” only</span></div>
            {data.mode === 'digest'
              ? <div className="set-row"><span className="set-k">Digest automation</span><span className="set-v">Room-Digest · daily 21:00 + intraday</span></div>
              : <div className="set-row"><span className="set-k">Chat mode</span><span className="set-v">Raw mirror · read view</span></div>}
            <div className="acc-note">Web chat never posts back to the group — publishing is an explicit admin action.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function MembersModal({ channel, roster, onClose }) {
  const isGroup = channel.kind === 'group';
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-h">
          <div>
            <div className="modal-t">{isGroup ? 'Members' : 'Participants'}</div>
            <div className="modal-s">{isGroup ? `${channel.label} · ${channel.id === 'btc-room' ? '218 members' : '96 members'}` : channel.label}</div>
          </div>
          <button className="modal-x" onClick={onClose} aria-label="Close"><Icon name="plus" size={16} /></button>
        </div>
        <div className="modal-body">
          {roster.map((m) => (
            <div className="member" key={m.name}>
              {m.bot
                ? <span className="m-ava agent"><img src="../logo-portrait.svg" alt="" /></span>
                : <span className="m-ava" style={{ background: avaColor(m.name) }}>{initials(m.name)}</span>}
              <div style={{ minWidth: 0 }}>
                <div className="m-name">{m.name}{m.bot && <span className="gbot">BOT</span>}</div>
                <div className="m-role">{m.role}</div>
              </div>
              {m.role === 'Admin' && <span className="m-tag">Admin</span>}
            </div>
          ))}
          {isGroup && <div className="member-more">+ {channel.id === 'btc-room' ? 211 : 90} more members</div>}
        </div>
      </div>
    </div>
  );
}

/* ===================== App ===================== */
const CONCEPTS = [
  { id: 'A', label: 'New user', width: 720 },
  { id: 'R', label: 'Returning', width: 680 },
  { id: 'K', label: 'KOL Digest', width: 720 },
];
// Embed contract used by alva-channel-workspace.html iframe snippets.
const INIT = new URLSearchParams(window.location.search);
const initOneOf = (key, allowed, fallback) => {
  const v = INIT.get(key);
  return allowed.includes(v) ? v : fallback;
};

function App() {
  const [channel, setChannel] = useState(initOneOf('channel', CHANNELS.map((c) => c.id), 'agent'));
  const [concept, setConcept] = useState(initOneOf('concept', CONCEPTS.map((c) => c.id), 'A'));
  const [tab, setTab] = useState(initOneOf('tab', TABS.map((t) => t.id), 'chat'));
  const [artSeg, setArtSeg] = useState(INIT.get('artifact')); // deep-link into an Artifacts segment (e.g. a SourceTag → automations)
  const goArtifacts = (seg) => { setArtSeg(typeof seg === 'string' ? seg : null); setTab('artifacts'); };
  const [extra, setExtra] = useState([]); // appended interaction messages
  const stageRef = useRef(null);
  const idRef = useRef(0);
  const channelRef = useRef(channel);
  channelRef.current = channel;

  const cfg = CONCEPTS.find((c) => c.id === concept);
  const cur = CHANNELS.find((c) => c.id === channel);
  const isAgent = cur.kind === 'agent';
  const groupData = cur.kind === 'group' ? GROUP_DATA[cur.id] : null;
  const scoped = groupData || CHANNEL_DATA[cur.id] || null;

  // scroll behaviour: top on concept/tab/channel switch, bottom on new interaction
  useEffect(() => { if (stageRef.current) stageRef.current.scrollTop = 0; }, [concept, tab, channel]);
  useEffect(() => {
    if (extra.length && stageRef.current) {
      const el = stageRef.current;
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }
  }, [extra]);

  const respond = useCallback((userText, reply) => {
    setTab('chat');
    const uid = ++idRef.current;
    setExtra((prev) => [...prev, { id: uid, role: 'user', text: userText }, { id: uid + 0.5, role: 'typing' }]);
    setTimeout(() => {
      setExtra((prev) => prev.filter((m) => m.id !== uid + 0.5).concat({ id: uid + 0.6, role: 'agent', reply }));
      // every background task reaches an end state
      if (reply.kind === 'task') {
        setTimeout(() => {
          setExtra((prev) => prev.map((m) => (m.id === uid + 0.6 ? { ...m, reply: { ...m.reply, status: 'done' } } : m)));
          // the channel just did real work but has no IM link — recommend one, once per channel
          const ch = channelRef.current;
          const c = CHANNELS.find((x) => x.id === ch);
          if (c && c.kind !== 'group' && !IM_LINKS[ch] && !IM_REC_SHOWN[ch]) {
            setTimeout(() => {
              if (channelRef.current !== ch || IM_LINKS[ch] || IM_REC_SHOWN[ch]) return;
              IM_REC_SHOWN[ch] = true;
              setExtra((prev) => [...prev, { id: ++idRef.current, role: 'agent', reply: { kind: 'imrec' } }]);
            }, 1400);
          }
        }, 4500);
      }
    }, 1000);
  }, []);

  const onPrompt = useCallback((text) => { respond(text, routeReply(text)); }, [respond]);
  const onSend = onPrompt;
  const onCard = useCallback((p) => {
    respond(`Open “${p.title}”`, { kind: 'building', title: `Opening ${p.title}`, sub: `Loading the latest run from ${p.creator}. You can remix it once it's ready.` });
  }, [respond]);

  // Clicking a skill (or its suggested prompt / CTA) starts a new Task, shaped by skill.kind
  const onStartTask = useCallback((skill, textOverride) => {
    const KIND = {
      automation: { type: 'Automation', tone: 'amber', title: `Automation: ${skill.label}`, sub: 'Wiring the alert rule and schedule. Once live, I\u2019ll watch in the background and push here on a trigger.', steps: ['Define the alert rule', 'Set the schedule and delivery', 'Activate the watch'] },
      playbook: { type: 'Playbook', tone: 'teal', title: `Build: ${skill.label}`, sub: 'Building your playbook — pulling data, drafting the layout, and wiring its refresh. You can tweak it once it\u2019s ready.', steps: ['Define scope and inputs', 'Pull data and build the view', 'Wire the refresh schedule'] },
    }[skill.kind];
    respond(textOverride || skill.prompt, { kind: 'task', taskType: KIND.type, tone: KIND.tone, title: KIND.title, sub: KIND.sub, steps: KIND.steps });
  }, [respond]);

  // Skills tab “Run skill” starts the same typed task flow
  const onSkill = useCallback((s) => onStartTask(s), [onStartTask]);

  // Start a digest automation from the follow onboarding — completes like any background task
  const onDigestAutomation = useCallback((count) => {
    respond(`Follow ${count} ${count === 1 ? 'voice' : 'voices'} and send me a daily AI digest`, {
      kind: 'task', taskType: 'Automation', tone: 'amber', title: 'Automation: KOL AI Digest',
      doneNote: `Live — following ${count} ${count === 1 ? 'voice' : 'voices'}, daily roundup 07:30 ET, pushed here + Telegram.`,
    });
  }, [respond]);

  // After an instant subscribe, Alva pushes the first run/alert so the conversation moves forward
  const onSubscribed = useCallback((skill, item) => {
    setTab('chat');
    const uid = ++idRef.current;
    setExtra((prev) => [...prev, { id: uid + 0.5, role: 'typing' }]);
    setTimeout(() => {
      setExtra((prev) => prev.filter((m) => m.id !== uid + 0.5).concat({ id: uid + 0.6, role: 'agent', reply: { kind: 'subpush', item, skillKind: skill.kind } }));
    }, 700);
  }, []);

  const handlers = { onSkill, onPrompt, onCard, onStartTask, onSubscribed, onGoTasks: () => setTab('tasks'), onGoArtifacts: goArtifacts };

  const switchConcept = (id) => { setConcept(id); setTab('chat'); setExtra([]); };
  const switchChannel = (id) => { setChannel(id); setTab('chat'); setExtra([]); };

  const onChat = tab === 'chat';
  const META = { agent: 'single channel', kol: 'campaign preset', topic: 'legacy hidden', group: 'legacy hidden' };
  const roster = groupData ? groupData.roster : [{ name: 'leo', role: 'You' }, { name: 'Alva', role: 'Agent', bot: true }];
  const [membersOpen, setMembersOpen] = useState(INIT.get('modal') === 'members');
  const [settingsOpen, setSettingsOpen] = useState(INIT.get('modal') === 'settings');
  const [imOpen, setImOpen] = useState(INIT.get('modal') === 'im');
  const [newChanOpen, setNewChanOpen] = useState(false);

  // create a personal topic channel: insert before the mirrored groups, open it fresh
  const createChannel = (name, about) => {
    let id = 'nc-' + (name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'channel');
    while (CHANNELS.some((c) => c.id === id)) id += '-2';
    const ch = { id, kind: 'topic', cls: 'ch-me', ico: 'hash', label: name, fresh: true,
      desc: about || 'A focused personal channel — scoped chat, tasks, and memory.' };
    const at = CHANNELS.findIndex((c) => c.kind === 'group');
    CHANNELS.splice(at < 0 ? CHANNELS.length : at, 0, ch);
    CHANNEL_DATA[id] = { tasks: [], files: [], autos: [], playbooks: [] };
    setNewChanOpen(false);
    switchChannel(id);
  };
  const [, imBump] = useState(0);
  const connectIm = (imId) => {
    IM_LINKS[channel] = { ...(IM_LINKS[channel] || {}), [imId]: true };
    imBump((n) => n + 1);
    const im = IMS.find((i) => i.id === imId);
    setExtra((prev) => [...prev, { id: ++idRef.current, role: 'agent', push: true, reply: { kind: 'answer', paras: [
      `Connected to ${im.label} — pushes from this channel now mirror to ${im.handle}. Reply there or here, it's the same conversation.`,
    ] } }]);
  };
  const disconnectIm = (imId) => { if (IM_LINKS[channel]) { delete IM_LINKS[channel][imId]; imBump((n) => n + 1); } };

  // global Ask side panel — its thread lives in the Alva Agent Channel context
  const [askOpen, setAskOpen] = useState(INIT.get('modal') === 'ask');
  const [askExtra, setAskExtra] = useState([]);
  const respondAsk = useCallback((text) => {
    const uid = ++idRef.current;
    const reply = routeReply(text);
    setAskExtra((prev) => [...prev, { id: uid, role: 'user', text }, { id: uid + 0.5, role: 'typing' }]);
    setTimeout(() => {
      setAskExtra((prev) => prev.filter((m) => m.id !== uid + 0.5).concat({ id: uid + 0.6, role: 'agent', reply }));
      if (reply.kind === 'task') {
        setTimeout(() => setAskExtra((prev) => prev.map((m) => (m.id === uid + 0.6 ? { ...m, reply: { ...m.reply, status: 'done' } } : m))), 4500);
      }
    }, 1000);
  }, []);

  return (
    <div className="app">
      <Sidebar channel={channel} onChannel={switchChannel} onNewChannel={() => setNewChanOpen(true)} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <span className={`topbar-mark ${cur.cls}`}>{isAgent ? <img src="../logo-portrait.svg" alt="Alva" /> : <Icon name={cur.ico} size={15} />}</span>
            <div className="topbar-id">
              <div className="tb-row"><span className="nm">{cur.label}</span><span className="st">· {META[cur.kind]}</span></div>
              <div className="tb-desc">{cur.desc}</div>
            </div>
          </div>
          <div className="topbar-right">
            {isAgent && (
              <div className="switcher">
                {CONCEPTS.map((c) => (
                  <button key={c.id} className={concept === c.id ? 'active' : ''} onClick={() => switchConcept(c.id)}>
                    <span className="dot"></span>{c.label}
                  </button>
                ))}
              </div>
            )}
            {cur.kind !== 'group' && (() => {
              const linked = IMS.filter((im) => IM_LINKS[channel] && IM_LINKS[channel][im.id]);
              return (
                <button className={`imlink${linked.length ? '' : ' ghost'}`} onClick={() => setImOpen(true)} aria-label="Connect IM">
                  {linked.length
                    ? <><span style={{ color: IM_TINT[linked[0].id], display: 'grid', placeItems: 'center' }}><Icon name={linked[0].icon} size={14} /></span><span>{linked.length > 1 ? `${linked[0].label} +${linked.length - 1}` : linked[0].label}</span><span className="im-dot"></span></>
                    : <><Icon name="link" size={14} /><span>Connect</span></>}
                </button>
              );
            })()}
            {GROUP_CHATS[channel] && GROUP_CHATS[channel].mode === 'mirror-ask' && (
              <button className="members-btn" onClick={() => setAskOpen(true)} aria-label="Ask Alva">
                <Icon name="agent" size={16} />
                <span className="mb-count">Ask Alva</span>
              </button>
            )}
            <button className="members-btn" onClick={() => setMembersOpen(true)} aria-label="Members">
              <Icon name="portfolio" size={16} />
              <span className="mb-count">{groupData ? cur.id === 'btc-room' ? '218' : '96' : roster.length}</span>
            </button>
            {cur.kind === 'group' && (
              <button className="members-btn" onClick={() => setSettingsOpen(true)} aria-label="Channel settings">
                <Icon name="sliders" size={16} />
              </button>
            )}
          </div>
        </div>
        {membersOpen && <MembersModal channel={cur} roster={roster} onClose={() => setMembersOpen(false)} />}
        {settingsOpen && <GroupSettingsModal channel={cur} onClose={() => setSettingsOpen(false)} />}
        {imOpen && <ImConnectModal channel={cur} autoConnect={typeof imOpen === 'string' ? imOpen : null} onClose={() => setImOpen(false)} onConnect={connectIm} onDisconnect={disconnectIm} />}
        {newChanOpen && <NewChannelModal onClose={() => setNewChanOpen(false)} onCreate={createChannel} />}
        {askOpen && <AskPanel context={cur} extra={askExtra} onSend={respondAsk} onClose={() => setAskOpen(false)} onGoTasks={() => { setAskOpen(false); setTab('tasks'); }} onGoArtifacts={(seg) => { setAskOpen(false); goArtifacts(seg); }} />}

        <TabBar tab={tab} onTab={(id) => { setArtSeg(null); setTab(id); }} counts={{
          tasks: scoped ? scoped.tasks.length : TASKS.length,
          artifacts: scoped ? (scoped.playbooks || []).length + scoped.autos.length + scoped.files.length : PLAYBOOKS.length + AUTOMATIONS.length + ARTIFACTS.length,
        }} />

        <div className="stage" ref={stageRef}>
          {tab === 'tasks' && <TasksPanel tasks={scoped ? scoped.tasks : TASKS} isGroup={!!groupData} channelLabel={cur.label} />}
          {tab === 'memory' && <MemoryPanel groupMem={scoped ? scoped.memory : null} channelLabel={cur.label} />}
          {tab === 'artifacts' && <ArtifactsPanel key={artSeg || 'd'} initialSeg={artSeg} channelId={cur.id} onCard={onCard} files={scoped ? scoped.files : ARTIFACTS} autos={scoped ? scoped.autos : AUTOMATIONS} playbooks={scoped ? (scoped.playbooks || []) : PLAYBOOKS} isGroup={!!groupData} />}

          {onChat && (isAgent ? (
            concept === 'K'
              ? <KolDigestView onDigest={onDigestAutomation} extra={extra} onGoTasks={() => setTab('tasks')} onGoArtifacts={goArtifacts} onConnectIm={(im) => setImOpen(im || true)} />
              : <div className="stage-inner" style={{ maxWidth: cfg.width }}>
                  {concept === 'A' && <ConceptA {...handlers} />}
                  {concept === 'R' && <ConceptR {...handlers} />}

                  <ExtraThread extra={extra} subtle={concept === 'A'} onGoTasks={() => setTab('tasks')} onGoArtifacts={goArtifacts} onConnectIm={(im) => setImOpen(im || true)} />
                </div>
          ) : null)}
        </div>

        {onChat && !(cur.kind === 'group' && GROUP_CHATS[channel] && GROUP_CHATS[channel].mode === 'mirror-ask') && (
          <Composer
            placeholder={concept === 'K' ? 'Ask about any call, add a KOL, or tune this digest' : null}
            quickReplies={isAgent && concept === 'R' ? [
              { icon: 'chat', text: 'Trim VRT or hold through Thursday?' },
              { icon: 'clock', text: 'My NVDA earnings game plan' },
              { icon: 'history', text: 'Walk me through my backtest' },
            ] : null}
            onSend={onSend} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
    <script src="/demo/_switcher.js" defer></script>
  </body>
</html>

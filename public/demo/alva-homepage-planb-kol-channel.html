function KolSourceStep({ selectedSource, onChangeSelected, onSelectMore, onConfirm, language, onLanguage, publishTime, onPublishTime }) {
  const source = sourceState(selectedSource);
  const selected = new Set(expandSourceState(source));
  const selectedTotal = sourceCount(source);
  const suggested = KOL_RECOMMENDED.filter((k) => !selected.has(k.handle)).slice(0, 9);
  const toggle = (handle) => {
    if (source.handles.includes(handle)) onChangeSelected(makeSourceState(source.handles.filter((h) => h !== handle), source.packs));
    else onChangeSelected(makeSourceState(Array.from(new Set(source.handles.concat(handle))), source.packs));
  };
  const togglePackage = (packId) => {
    const packs = source.packs.includes(packId)
      ? source.packs.filter((id) => id !== packId)
      : source.packs.concat(packId);
    onChangeSelected(makeSourceState(source.handles, packs));
  };
  return (
    <div className="onboard-card">
      <div className="onboard-title">Choose the KOLs you want Alva to read.</div>
      <div className="onboard-sub">Pick from the suggested list. Selected KOLs move below, and new candidates will fill the open spots automatically.</div>
      <div className="kol-pack-grid">
        {KOL_SOURCE_PACKS.map((pack) => (
          <button className={`kol-pack ${source.packs.includes(pack.id) ? 'active' : ''}`} key={pack.id} onClick={() => togglePackage(pack.id)}>
            <span className="pack-top"><PackAvatarStack packId={pack.id} /><span className="choice-check"><Icon name="check" size={12} /></span></span>
            <strong>{pack.label}</strong>
            <span>{pack.desc}</span>
          </button>
        ))}
      </div>
      <div className="source-head">
        <div className="source-head-copy">
          <span className="source-title">Suggested KOLs</span>
        </div>
        <button className="kol-secondary source-more" onClick={onSelectMore}><Icon name="search" size={15} /> Select more</button>
      </div>
      {suggested.length ? (
        <div className="source-list">
          {suggested.map((k) => {
            return (
              <button className="source-row" key={k.handle} onClick={() => toggle(k.handle)}>
                <KolAvatar kol={k} />
                <span className="source-id">
                  <span className="source-name">{k.name}</span>
                  <span className="source-handle">{k.handle}</span>
                </span>
              </button>
            );
          })}
        </div>
      ) : (
        <div className="source-empty">All suggested demo KOLs are already selected. Use Select more or remove a selected tag below to refine the list.</div>
      )}
      <div className="picked-title">Selected sources · {selectedTotal} KOLs covered</div>
      <div className="picked-list">
        <SourceSelectionList source={source} onToggleHandle={toggle} onTogglePack={togglePackage} />
      </div>
      <KolOnboardingSettings language={language} onLanguage={onLanguage} publishTime={publishTime} onPublishTime={onPublishTime} />
      <div className="onboard-actions source-footer">
        <button className="onboard-primary" disabled={!selectedTotal} onClick={onConfirm}>Generate digest with {selectedTotal || 0} KOLs<Icon name="spark" size={15} /></button>
      </div>
    </div>
  );
}

/* ===================== App ===================== */
const CONCEPTS = [
  { id: 'A', label: 'Quiet Welcome', width: 720 },
  { id: 'B', label: 'Guided Onboarding', width: 780 },
  { id: 'D', label: 'Calm + Rich', width: 740 },
  { id: 'C', label: 'Briefing Feed', width: 640 },
];

function App() {
  const [channel, setChannel] = useState('agent');
  const [kolSpecialOnboarding, setKolSpecialOnboarding] = useState(true);
  const [concept, setConcept] = useState('A');
  const [tab, setTab] = useState('chat');
  const [extra, setExtra] = useState([]); // appended interaction messages
  const [kolSource, setKolSource] = useState(makeSourceState());
  const [kolDraftSource, setKolDraftSource] = useState(makeSourceState());
  const [kolLanguage, setKolLanguage] = useState('en');
  const [kolDraftLanguage, setKolDraftLanguage] = useState('en');
  const [kolAnalysisMode, setKolAnalysisMode] = useState(KOL_DEFAULT_ANALYSIS_MODE);
  const [kolDraftAnalysisMode, setKolDraftAnalysisMode] = useState(KOL_DEFAULT_ANALYSIS_MODE);
  const [kolTemplate, setKolTemplate] = useState(KOL_DEFAULT_TEMPLATE);
  const [kolDraftTemplate, setKolDraftTemplate] = useState(KOL_DEFAULT_TEMPLATE);
  const [kolPickerOpen, setKolPickerOpen] = useState(false);
  const [kolGenerating, setKolGenerating] = useState(false);
  const [kolDigestRuns, setKolDigestRuns] = useState([]);
  const [kolTimeline, setKolTimeline] = useState([]);
  const [kolOpenDigest, setKolOpenDigest] = useState(null);
  const [kolConnectedIMs, setKolConnectedIMs] = useState([]);
  const [kolPublishTime, setKolPublishTime] = useState('07:30 ET');
  const [kolDraftPublishTime, setKolDraftPublishTime] = useState('07:30 ET');
  const [kolOnboardingDone, setKolOnboardingDone] = useState(false);
  const [kolAutomationEditorOpen, setKolAutomationEditorOpen] = useState(false);
  const [kolPromptDismissed, setKolPromptDismissed] = useState([]);
  const stageRef = useRef(null);
  const idRef = useRef(0);

  const cfg = CONCEPTS.find((c) => c.id === concept);
  const cur = CHANNELS.find((c) => c.id === channel);
  const isAgent = cur.kind === 'agent';
  const groupData = cur.kind === 'group' ? GROUP_DATA[cur.id] : null;
  const scoped = groupData || CHANNEL_DATA[cur.id] || null;
  const kolDigest = kolDigestRuns.length ? kolDigestRuns[kolDigestRuns.length - 1] : null;

  // scroll behaviour: top on concept/tab/channel switch, bottom on new interaction
  useEffect(() => { if (stageRef.current) stageRef.current.scrollTop = 0; }, [concept, tab, channel]);
  useEffect(() => {
    if (extra.length && stageRef.current) {
      const el = stageRef.current;
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }
  }, [extra]);
  useEffect(() => {
    if ((kolSpecialOnboarding || kolDigest) && tab === 'chat' && stageRef.current) {
      const el = stageRef.current;
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }
  }, [kolSpecialOnboarding, tab, sourceCount(kolSource), kolDigest, kolOnboardingDone, kolTimeline.length]);
  useEffect(() => {
    if (kolSpecialOnboarding && !kolOnboardingDone && tab !== 'chat') setTab('chat');
  }, [kolSpecialOnboarding, kolOnboardingDone, tab]);

  const respond = useCallback((userText, reply) => {
    setTab('chat');
    const uid = ++idRef.current;
    setExtra((prev) => [...prev, { id: uid, role: 'user', text: userText }, { id: uid + 0.5, role: 'typing' }]);
    setTimeout(() => {
      setExtra((prev) => prev.filter((m) => m.id !== uid + 0.5).concat({ id: uid + 0.6, role: 'agent', reply }));
    }, 1000);
  }, []);
  const respondPlain = useCallback((userText, text) => {
    setTab('chat');
    const uid = ++idRef.current;
    setExtra((prev) => [...prev, { id: uid, role: 'user', text: userText }, { id: uid + 0.6, role: 'agent', reply: { kind: 'plain', text } }]);
  }, []);

  const onSkill = useCallback((s) => {
    respond(`Use ${s.label}`, { kind: 'building', title: `Spinning up ${s.label}`, sub: 'Pulling data and drafting your first version — this usually takes a moment.' });
  }, [respond]);
  const onPrompt = useCallback((text) => {
    respond(text, { kind: 'building', title: 'On it', sub: 'Researching, then building a playbook you can run and tweak.' });
  }, [respond]);
  const onCard = useCallback((p) => {
    respond(`Open “${p.title}”`, { kind: 'building', title: `Opening ${p.title}`, sub: `Loading the latest run from ${p.creator}. You can remix it once it's ready.` });
  }, [respond]);
  const onSend = useCallback((text) => {
    if (kolDigest) {
      const latest = kolDigest.items[kolDigest.items.length - 1];
      const basePrompt = normalizeKolPrompt(text, latest);
      if (basePrompt) {
        setKolPromptDismissed((prev) => prev.includes(basePrompt) ? prev : prev.concat(basePrompt));
      }
      respondPlain(text, kolPromptAnswer(text, kolDigest));
      return;
    }
    respond(text, { kind: 'building', title: 'On it', sub: 'Researching, then building a playbook you can run and tweak.' });
  }, [respond, respondPlain, kolDigest]);

  // Clicking a skill (or its suggested prompt / CTA) starts a new Task, shaped by skill.kind
  const onStartTask = useCallback((skill) => {
    const KIND = {
      ask: { type: 'Research', tone: 'blue', title: `Research: ${skill.label}`, sub: 'Gathering sources and drafting the answer. I\u2019ll post the finished brief here and save it to Artifacts.', steps: ['Parse the question and scope', 'Pull sources and data', 'Draft the brief'] },
      automation: { type: 'Automation', tone: 'amber', title: `Automation: ${skill.label}`, sub: 'Wiring the alert rule and schedule. Once live, I\u2019ll watch in the background and push here on a trigger.', steps: ['Define the alert rule', 'Set the schedule and delivery', 'Activate the watch'] },
      playbook: { type: 'Playbook', tone: 'teal', title: `Build: ${skill.label}`, sub: 'Building your playbook — pulling data, drafting the layout, and wiring its refresh. You can tweak it once it\u2019s ready.', steps: ['Define scope and inputs', 'Pull data and build the view', 'Wire the refresh schedule'] },
    }[skill.kind];
    respond(skill.prompt, { kind: 'task', taskType: KIND.type, tone: KIND.tone, title: KIND.title, sub: KIND.sub, steps: KIND.steps });
  }, [respond]);

  const onKolDraftAnalysisMode = useCallback((mode) => {
    const next = modeById(mode);
    setKolDraftAnalysisMode(next.id);
    setKolDraftTemplate(next.template);
  }, []);
  const pushKolTimeline = useCallback((item) => {
    setKolTimeline((prev) => prev.concat({ id: `${Date.now()}-${prev.length}-${Math.random().toString(36).slice(2, 7)}`, ...item }));
  }, []);
  const buildKolDigest = useCallback((settings) => {
    const mode = modeById(settings.analysisMode);
    const cadenceItems = ['daily'];
    const isZh = settings.language === 'zh';
    const cadenceLabel = cadenceLabelFrom(cadenceItems, isZh);
    const modeLabelsZh = {
      market_digest: '市场综述',
      idea_scout: '投资标的建议',
      consensus_map: '共识地图',
      risk_watch: '风险观察',
      custom: '自定义分析',
    };
    const modeLabel = isZh ? (modeLabelsZh[mode.id] || mode.label) : mode.label;
    const templateEdited = normalizeTemplate(settings.template) !== normalizeTemplate(mode.template);
    const selectedHandles = expandSourceState(settings.source);
    const sourceTotal = sourceCount(settings.source);
    const items = cadenceItems.map((kind) => {
      const sample = makeDigestSample(settings.language, kind);
      const label = kind === 'weekly' ? 'Weekly' : 'Daily';
      const titleLabel = isZh ? (kind === 'weekly' ? '周报' : '日报') : `${label} Digest`;
      const windowLabel = kind === 'weekly'
        ? (isZh ? '过去一周' : 'Past week')
        : sample.window;
      const customLabel = templateEdited ? (isZh ? '自定义模板' : 'Custom template') : null;
      const metaParts = [
        isZh ? '中文' : 'English',
        digestDateLabel(settings.language),
        digestKindLabel(kind, settings.language),
        windowLabel,
      ];
      if (customLabel) metaParts.push(customLabel);
      const digest = {
        ...sample,
        kind,
        title: `${titleLabel} · ${modeLabel}`,
        meta: metaParts.join(' · '),
        cadence: kind,
        language: settings.language,
        analysisMode: mode.id,
        sourceCount: sourceTotal,
        sourceHandles: selectedHandles.slice(),
        templateEdited,
      };
      return digest;
    });
    return {
      id: Date.now(),
      title: `${cadenceLabel} Digest`,
      meta: `${isZh ? '中文' : 'English'} · ${digestDateLabel(settings.language)} · ${cadenceLabel} · ${isZh ? '最新预览' : KOL_REAL_DIGEST_SAMPLE.window}`,
      tag: 'Generated',
      cadence: cadenceItems.slice(),
      selectedHandles: selectedHandles.slice(),
      source: sourceState(settings.source),
      language: settings.language,
      analysisMode: settings.analysisMode,
      template: settings.template,
      items,
    };
  }, []);
  const runKolGenerate = useCallback((settings, { saveMemory = false } = {}) => {
    if (!sourceCount(settings.source) || kolGenerating) return;
    setTab('chat');
    setKolGenerating(true);
    setTimeout(() => {
      try {
        const digest = buildKolDigest(settings);
        if (saveMemory) {
          const savedSource = sourceState(settings.source);
          setKolSource(savedSource);
          setKolDraftSource(savedSource);
          setKolLanguage(settings.language);
          setKolDraftLanguage(settings.language);
          setKolAnalysisMode(settings.analysisMode);
          setKolDraftAnalysisMode(settings.analysisMode);
          setKolTemplate(settings.template);
          setKolDraftTemplate(settings.template);
          if (settings.publishTime) {
            setKolPublishTime(settings.publishTime);
            setKolDraftPublishTime(settings.publishTime);
          }
        }
        setKolPromptDismissed([]);
        setKolDigestRuns((prev) => prev.concat(digest));
        setKolTimeline((prev) => prev.concat(digest.items.map((item, index) => ({
          id: `${digest.id}-${item.kind}-${prev.length + index}`,
          type: 'digest',
          digest: item,
        }))));
        setKolOpenDigest(null);
      } finally {
        setKolGenerating(false);
      }
    }, 2600);
  }, [kolGenerating, buildKolDigest]);
  const onKolConfirmSources = useCallback(() => {
    if (!sourceCount(kolDraftSource) || kolGenerating) return;
    const nextSource = sourceState(kolDraftSource);
    const nextLanguage = kolDraftLanguage || kolLanguage;
    setKolSource(nextSource);
    setKolLanguage(nextLanguage);
    pushKolTimeline({ type: 'selected-summary', source: nextSource });
    runKolGenerate({ source: nextSource, language: nextLanguage, analysisMode: kolDraftAnalysisMode, template: kolDraftTemplate, publishTime: kolPublishTime }, { saveMemory: true });
  }, [kolDraftSource, kolGenerating, pushKolTimeline, runKolGenerate, kolDraftLanguage, kolLanguage, kolDraftAnalysisMode, kolDraftTemplate, kolPublishTime]);
  const onKolGenerate = useCallback(() => {
    runKolGenerate({ source: kolSource, language: kolLanguage, analysisMode: kolAnalysisMode, template: kolTemplate, publishTime: kolPublishTime });
  }, [runKolGenerate, kolSource, kolLanguage, kolAnalysisMode, kolTemplate, kolPublishTime]);
  const onKolSaveAndGenerate = useCallback(() => {
    setTab('chat');
    runKolGenerate({ source: kolDraftSource, language: kolDraftLanguage, analysisMode: kolDraftAnalysisMode, template: kolDraftTemplate, publishTime: kolDraftPublishTime }, { saveMemory: true });
  }, [runKolGenerate, kolDraftSource, kolDraftLanguage, kolDraftAnalysisMode, kolDraftTemplate, kolDraftPublishTime]);
  const onKolConnectedIM = useCallback((id) => {
    setKolConnectedIMs((prev) => prev.includes(id) ? prev : prev.concat(id));
  }, []);
  const onKolPublishLanguage = useCallback((language) => {
    setKolLanguage(language);
    setKolDraftLanguage(language);
  }, []);
  const onKolCompleteOnboarding = useCallback((connectedOverride) => {
    const connected = Array.isArray(connectedOverride) && connectedOverride.length ? connectedOverride : kolConnectedIMs.slice();
    setKolOnboardingDone(true);
    setKolSpecialOnboarding(false);
    setTab('chat');
    pushKolTimeline({ type: 'done', connectedIMs: connected });
  }, [kolConnectedIMs, pushKolTimeline]);
  const kolProps = {
    selectedSource: kolSource,
    draftSource: kolDraftSource,
    onDraftSource: setKolDraftSource,
    onConfirmSources: onKolConfirmSources,
    onSelectKols: () => setKolPickerOpen(true),
    savedMemory: { source: kolSource, language: kolLanguage, analysisMode: kolAnalysisMode, template: kolTemplate, publishTime: kolPublishTime },
    language: kolLanguage,
    onLanguage: onKolPublishLanguage,
    draftLanguage: kolDraftLanguage,
    onDraftLanguage: setKolDraftLanguage,
    analysisMode: kolAnalysisMode,
    draftAnalysisMode: kolDraftAnalysisMode,
    onDraftAnalysisMode: onKolDraftAnalysisMode,
    digestTemplate: kolTemplate,
    draftTemplate: kolDraftTemplate,
    onDraftTemplate: setKolDraftTemplate,
    onGenerate: onKolGenerate,
    onSaveAndGenerate: onKolSaveAndGenerate,
    generating: kolGenerating,
    digestRuns: kolDigestRuns,
    timeline: kolTimeline,
    lastDigest: kolDigest,
    openDigest: kolOpenDigest,
    onOpenDigest: setKolOpenDigest,
    connectedIMs: kolConnectedIMs,
    onConnectedIM: onKolConnectedIM,
    publishTime: kolPublishTime,
    onPublishTime: setKolPublishTime,
    draftPublishTime: kolDraftPublishTime,
    onDraftPublishTime: setKolDraftPublishTime,
    onboardingDone: kolOnboardingDone,
    onCompleteOnboarding: onKolCompleteOnboarding,
    onOpenAutomationEditor: () => setKolAutomationEditorOpen(true),
  };

  const handlers = { onSkill, onPrompt, onCard, onStartTask };

  const switchConcept = (id) => { setConcept(id); setTab('chat'); setExtra([]); };
  const switchChannel = (id) => { setChannel(id); setTab('chat'); setExtra([]); };

  const onChat = tab === 'chat';
  const META = { agent: 'personal channel', kol: 'personal channel', topic: 'personal channel', group: cur.cls === 'ch-tg' ? 'Telegram group' : 'Discord group' };
  const roster = groupData ? groupData.roster : [{ name: 'leo', role: 'You' }, { name: 'Alva', role: 'Agent', bot: true }];
  const [membersOpen, setMembersOpen] = useState(false);

  return (
    <div className="app">
      <Sidebar channel={channel} onChannel={switchChannel} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <span className={`topbar-mark ${cur.cls}`}>{isAgent ? <img src="../logo-portrait.svg" alt="Alva" /> : <Icon name={cur.ico} size={15} />}</span>
            <div className="topbar-id">
              <div className="tb-row"><span className="nm">{cur.label}</span><span className="st">· {META[cur.kind]}</span></div>
              <div className="tb-desc">{cur.desc}</div>
            </div>
          </div>
          <div className="topbar-right">
            {isAgent && kolOnboardingDone && (
              <div className="switcher">
                {CONCEPTS.map((c) => (
                  <button key={c.id} className={concept === c.id ? 'active' : ''} onClick={() => switchConcept(c.id)}>
                    <span className="dot"></span>{c.label}
                  </button>
                ))}
              </div>
            )}
            <button className="members-btn" onClick={() => setMembersOpen(true)} aria-label="Members">
              <Icon name="portfolio" size={16} />
              <span className="mb-count">{groupData ? cur.id === 'btc-room' ? '218' : '96' : roster.length}</span>
            </button>
          </div>
        </div>
        {membersOpen && <MembersModal channel={cur} roster={roster} onClose={() => setMembersOpen(false)} />}

        <TabBar tab={tab} onTab={setTab} kolOnboardingDone={kolOnboardingDone} kolArtifactCount={kolDigest ? digestHistoryFilesFrom(kolDigestRuns).length : 0} />

        <div className="stage" ref={stageRef}>
          {tab === 'memory' && kolOnboardingDone && <KolMemoryPanel {...kolProps} />}
          {tab === 'alerts' && kolOnboardingDone && <KolAlertsPanel {...kolProps} onOpenEditor={() => setKolAutomationEditorOpen(true)} />}
          {tab === 'artifacts' && kolOnboardingDone && <KolArtifactsPanel digestRuns={kolDigestRuns} onOpenDigest={setKolOpenDigest} />}

          {onChat && (kolSpecialOnboarding || kolDigest ? (
            <KolDigestView {...kolProps} extra={extra} onGoArtifacts={() => setTab('artifacts')} />
          ) : isAgent ? (
            <div className="stage-inner" style={{ maxWidth: cfg.width }}>
              {concept === 'A' && <ConceptA {...handlers} />}
              {concept === 'B' && <ConceptB {...handlers} />}
              {concept === 'D' && <ConceptD {...handlers} />}
              {concept === 'C' && <ConceptC {...handlers} />}

              <ExtraThread extra={extra} subtle={concept === 'A' || concept === 'D'} onGoTasks={() => setTab('tasks')} onGoArtifacts={() => setTab('artifacts')} />
            </div>
          ) : cur.kind === 'group' ? <GroupChannelView channel={cur} onGoTasks={() => setTab('tasks')} /> : <TopicChannelView channel={cur} />)}
        </div>

        <KolAutomationEditor
          open={kolAutomationEditorOpen}
          onClose={() => setKolAutomationEditorOpen(false)}
          {...kolProps} />

        {kolPickerOpen && <KolPickerModal
          selectedSource={kolDraftSource}
          onChange={(next) => {
            setKolDraftSource(next);
            setKolOpenDigest(null);
          }}
          onClose={() => setKolPickerOpen(false)} />}

        {kolOpenDigest && <KolDigestModal digest={kolOpenDigest} onClose={() => setKolOpenDigest(null)} />}

        {onChat && kolOnboardingDone && (
          <Composer
            placeholder={kolDigest ? 'Ask about this digest, compare KOL views, or edit the setup' : null}
            quickReplies={kolDigest ? kolFollowupPrompts(kolDigest, kolPromptDismissed) : null}
            onSend={onSend} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
    <script src="/demo/_switcher.js" defer></script>
  </body>
</html>
